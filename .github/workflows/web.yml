name: Deploy Web

on:
  push:
    branches: [main]

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-node@v4
      with:
        node-version: 22.13
        cache: pnpm

    - uses: pnpm/action-setup@v4
      with:
        run_install: false

    - run: corepack enable
    - run: pnpm install --frozen-lockfile
    - run: pnpm check-types
    - run: pnpm lint
    - run: pnpm --filter web build

    - run: pnpm dlx vercel --prod --token=${{ secrets.VERCEL_TOKEN_WEB_FRAMEFORGE }} --cwd apps/web